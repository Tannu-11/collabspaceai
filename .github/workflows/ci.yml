name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js 18.x
      uses: actions/setup-node@v3
      with:
        node-version: 18.x
        
    - name: Install Server Dependencies
      run: |
        cd server
        npm ci

    - name: Install Client Dependencies and Build
      run: |
        cd client
        npm ci
        npm run build

  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Server Image
      run: |
        cd server
        docker build -t collabspace-server:latest .
        
    - name: Build Client Image
      run: |
        cd client
        docker build -t collabspace-client:latest .
        
    # Note: AWS deployment steps (e.g., to ECR/ECS) can be added here in the future
